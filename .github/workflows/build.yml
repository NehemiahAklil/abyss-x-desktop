name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release'
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Allow build scripts
        run: pnpm approve-builds electron electron-builder electron-winstaller

      - name: Build AppImage + deb
        run: pnpm build:linux --publish never && pnpm build:deb --publish never

      - name: Package Linux tarball (installer script + AppImage)
        run: |
          STAGE="$(mktemp -d)/abyss-x-linux"
          mkdir -p "$STAGE"
          cp dist/*.AppImage "$STAGE/$BIN_FILENAME"
          chmod +x "$STAGE/$BIN_FILENAME"
          cp scripts/install_abyss_x.sh "$STAGE/"
          chmod +x "$STAGE/install_abyss_x.sh"
          VERSION="$(node -p "require('./package.json').version")"
          tar -czf "dist/Abyss-X-${VERSION}-linux.tar.gz" -C "$(dirname "$STAGE")" "$(basename "$STAGE")"
        env:
          BIN_FILENAME: AbyssX

      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
          if-no-files-found: warn

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Allow build scripts
        run: pnpm approve-builds electron electron-builder electron-winstaller || true

      - name: Build NSIS installer
        run: pnpm build:win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.exe
          if-no-files-found: error

  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Allow build scripts
        run: pnpm approve-builds electron electron-builder electron-winstaller || true

      - name: Build DMG + ZIP
        run: pnpm build:mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-dist'
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft }}
          generate_release_notes: true
          body: |
            ## Linux — recommended install

            Download **`Abyss-X-*-linux.tar.gz`**, extract it, then run the installer:

            ```bash
            tar -xzf Abyss-X-*-linux.tar.gz
            cd abyss-x-linux
            ./install_abyss_x.sh
            ```

            It copies the AppImage to `~/.local/bin` (or system-wide with `sudo`) and
            wires up the app icon and menu entry. Run the same script again anytime to
            uninstall. A bare `*.AppImage` and a `.deb` are also attached below.
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
